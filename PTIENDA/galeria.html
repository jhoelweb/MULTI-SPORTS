  <style>
    /* Estilos generales */
    body {
      background-color: white;

      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;

    /* Navbar */
    .navbar {
      background: linear-gradient(to left, hsl(240, 3%, 7%), hsl(220, 16%, 96%));
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
    }
    .navbar:hover {
      background: linear-gradient(90deg, #1f2937, #4b5563);
    }

    
    .navbar img {
      height: 90px;
      cursor: pointer;
      filter: drop-shadow(0 0 4px #e4f875);
      transition: transform 0.3s ease;
    }
         .navbar img:hover {
      transform: scale(1.1);
      filter: drop-shadow(0 0 10px #e4f875);
    }

    .navbar h1 {
      margin-left: 10px;
      font-size: 1.5em;
    }

    .dropdown {
      position: relative;
      display: inline-block;
    }
    .dropdown > button {
      background: none;
      border: none;
      color: black;
      padding: 10px 15px;
      cursor: pointer;
      font-weight: 600;
      font-size: 1em;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #f9f9f9;
      color: black;
      min-width: 160px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      border-radius: 5px;
      z-index: 10;
      top: 100%;
      left: 0;
    }
    .dropdown-content a {
      display: flex;
      align-items: center;
      padding: 10px 15px;
      text-decoration: none;
      color: black;
      font-weight: 500;
    }
    .dropdown-content a:hover {
      background-color: #ddd;
    }
    .dropdown:hover .dropdown-content {
      display: block;
    }
    /* Contenido Sobre Nosotros */
    .container {
      padding: 40px 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .container h2 {
      text-align: center;
      font-size: 2em;
      margin-bottom: 20px;
      color: #2e86de;
    }

    .container p {
      line-height: 1.7;
      margin-bottom: 20px;
      text-align: justify;
    }

    /* Footer */
   footer {
      background: linear-gradient(90deg, #0d1117 0%, #161b22 100%);
      color: #bbb;
      padding: 40px 20px 20px 20px;
      text-align: center;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.7);
    }

    .footer-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
      margin-bottom: 30px;
    }

    .logo {
      width: 160px;
      height: auto;
      filter: drop-shadow(0 0 6px #ffea00);
      transition: filter 0.3s ease;
      cursor: default;
    }

    .logo:hover {
      filter: drop-shadow(0 0 15px #fff266);
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .social-icons a {
      display: inline-block;
      transition: transform 0.3s ease;
    }

    .social-icons a:hover {

    }

    .social-icons img {
      width: 36px;
      height: 36px;
      filter: brightness(0) invert(1); /* blanco para resaltar en fondo negro */
      cursor: pointer;
      transition: filter 0.3s ease;
    }

    .social-icons img:hover {
      filter: drop-shadow(0 0 8px #ffea00);
    }

    .divider {
      border-top: 1px solid #ffea00;
      margin: 20px auto;
      width: 90%;

    }

    .legal {

      color: #999900;
      font-style: italic;

    }
  </style>

<style>
  .contenido {
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .carousel-container {
    width: 400px;
    height: 350px;
    overflow: hidden;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    position: relative;
  }

  .carousel-track {
    display: flex;
    width: calc(400px * 9);
    animation: scroll 16s linear infinite;
  }

  .carousel-track img {
    width: 400px;
    height: 350px;
    object-fit: cover;
    transition: transform 0.5s ease, filter 0.5s ease;
  }

  .carousel-track img:hover {
    transform: scale(1.05);
    filter: brightness(1.1);
  }

  @keyframes scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-3600px); }
  }

  #video-container {
    width: 400px;
    height: 350px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    overflow: hidden;
  }

  #video-container iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 12px;
  }
</style>

<script>
  const track = document.querySelector('.carousel-track');
  track.addEventListener('mouseenter', () => {
    track.style.animationPlayState = 'paused';
  });
  track.addEventListener('mouseleave', () => {
    track.style.animationPlayState = 'running';
  });

  // Función para insertar un video de YouTube en el contenedor
  function insertarVideoYouTube(idVideo) {
    const iframe = document.createElement('iframe');
    iframe.src = `https://www.youtube.com/embed/${idVideo}`;
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
    iframe.allowFullscreen = true;

    const container = document.getElementById('video-container');
    container.appendChild(iframe);
  }

  insertarVideoYouTube('IB0cAmqa3dw'); // ID del video de YouTube
</script>
